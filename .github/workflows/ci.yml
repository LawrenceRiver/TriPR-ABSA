name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -r requirements-dev.txt
      - name: Ruff lint
        run: ruff check pragmatic_residual scripts tests
      - name: Ruff format
        run: ruff format --check pragmatic_residual scripts tests
      - name: Tests
        run: pytest -q
